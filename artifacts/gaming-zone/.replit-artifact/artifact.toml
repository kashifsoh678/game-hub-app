kind = "web"
previewPath = "/"
title = "Gaming Zone Management"
version = "1.0.0"
id = "artifacts/gaming-zone"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21243

[services.development]
run = "pnpm --filter @workspace/gaming-zone run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/gaming-zone", "run", "build" ]
publicDir = "artifacts/gaming-zone/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21243"
BASE_PATH = "/"
